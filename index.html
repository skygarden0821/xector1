<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="XECTOR1">
<meta name="theme-color" content="#0d0d14">
<title>XECTOR1 — Member Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <span class="topbar-logo">XECTOR1</span>
    <div class="topbar-right">
      <span class="topbar-name" id="topbar-member"></span>
      <button class="avatar-wrap" onclick="goPage('settings')" aria-label="設定を開く">
        <div class="avatar avatar-sm" id="topbar-avatar-inner">?</div>
      </button>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="content" id="content">

    <!-- ════ HOME ════ -->
    <div id="page-home" class="page active">

      <div class="home-top">
        <div class="home-top-text">
          <p class="home-greeting" id="home-greeting">こんにちは</p>
          <h1 class="home-name" id="home-name">メンバー</h1>
        </div>
        <button class="avatar-wrap" onclick="goPage('settings')" aria-label="プロフィール設定">
          <div class="avatar avatar-lg" id="home-avatar-inner">?</div>
          <span class="avatar-label">設定</span>
        </button>
      </div>

      <!-- 目標 -->
      <button class="goal-card" onclick="goPage('settings')">
        <span class="goal-kicker">MY GOAL</span>
        <span class="goal-body" id="goal-text">目標を設定する</span>
        <span class="goal-arrow">→</span>
      </button>

      <!-- アクション -->
      <div class="action-list">
        <button class="action-card action-primary" onclick="goPage('book')">
          <div class="action-card-body">
            <span class="action-kicker">NEXT SESSION</span>
            <span class="action-title">面談を予約する</span>
            <span class="action-desc">空き枠を確認してセッションを予約してください</span>
          </div>
          <span class="action-arrow-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </span>
        </button>

        <button class="action-card" onclick="goPage('tips')">
          <div class="action-card-body">
            <span class="action-kicker">KNOWLEDGE BASE</span>
            <span class="action-title">Tips を見る</span>
            <span class="action-desc">SNS成長のための最新ノウハウをチェックしてください</span>
          </div>
          <span class="action-arrow-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </span>
        </button>
      </div>

    </div><!-- /home -->

    <!-- ════ TIPS ════ -->
    <div id="page-tips" class="page">
      <div class="page-header">
        <h2 class="page-title">Tips</h2>
        <p class="page-desc">SNS成長のための知識</p>
      </div>
      <div class="filter-row" id="filter-row"></div>
      <div class="tips-list" id="tips-list"></div>
    </div>

    <!-- ════ BOOK ════ -->
    <div id="page-book" class="page">
      <div class="page-header">
        <h2 class="page-title">予約</h2>
        <p class="page-desc">セッションを選んで日程を予約してください</p>
      </div>
      <div class="tab-bar">
        <button class="tab active" id="prog-tab-1" onclick="switchProgram(1)">プロデュース</button>
        <button class="tab" id="prog-tab-2" onclick="switchProgram(2)">ボイトレ A</button>
        <button class="tab" id="prog-tab-3" onclick="switchProgram(3)">ボイトレ B</button>
      </div>
      <div id="ycbm-panel-1" class="iframe-wrap">
        <iframe src="https://skygarden0821.youcanbook.me/" frameborder="0" scrolling="yes" allowtransparency="true"></iframe>
      </div>
      <div id="ycbm-panel-2" class="iframe-wrap" style="display:none;">
        <iframe src="https://xector1voice01.youcanbook.me/" frameborder="0" scrolling="yes" allowtransparency="true"></iframe>
      </div>
      <div id="ycbm-panel-3" class="iframe-wrap" style="display:none;">
        <iframe src="https://xector1voice02.youcanbook.me/" frameborder="0" scrolling="yes" allowtransparency="true"></iframe>
      </div>
    </div>

    <!-- ════ SETTINGS ════ -->
    <div id="page-settings" class="page">
      <div class="page-header">
        <h2 class="page-title">設定</h2>
        <p class="page-desc">プロフィールと目標を編集します</p>
      </div>

      <!-- アバター -->
      <section class="settings-block">
        <h3 class="settings-label">アイコン画像</h3>
        <div class="avatar-edit-area">
          <button class="avatar-edit-btn" onclick="document.getElementById('avatar-file-input').click()">
            <div class="avatar avatar-xl" id="avatar-preview-inner">?</div>
          </button>
          <button class="btn-outline" onclick="document.getElementById('avatar-file-input').click()">画像を変更する</button>
        </div>
        <input type="file" id="avatar-file-input" accept="image/*" style="display:none" onchange="onAvatarFileSelected(event)">
        <div class="crop-box" id="avatar-crop-wrap">
          <p class="crop-note">ドラッグで位置を調整・ピンチでズーム</p>
          <div class="crop-canvas-wrap" id="crop-canvas-wrap">
            <canvas id="crop-canvas"></canvas>
          </div>
          <div class="crop-buttons">
            <button class="btn-outline" onclick="cancelCrop()">キャンセル</button>
            <button class="btn-primary" onclick="saveCrop()">保存する</button>
          </div>
        </div>
      </section>

      <!-- 名前 -->
      <section class="settings-block">
        <h3 class="settings-label">表示名</h3>
        <input class="field" type="text" id="settings-name" placeholder="例：田中雄介">
        <button class="btn-primary" onclick="saveName()">保存する</button>
      </section>

      <!-- 目標 -->
      <section class="settings-block">
        <h3 class="settings-label">目標</h3>
        <textarea class="field field-ta" id="settings-goal" placeholder="例：2025年末までにYouTube登録者10万人達成する"></textarea>
        <button class="btn-primary" onclick="saveGoal()">保存する</button>
      </section>

      <div class="page-bottom-pad"></div>
    </div>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-home" onclick="goPage('home')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="nav-label">ホーム</span>
    </button>
    <button class="nav-item" id="nav-tips" onclick="goPage('tips')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <span class="nav-label">Tips</span>
    </button>
    <button class="nav-item" id="nav-book" onclick="goPage('book')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span class="nav-label">予約</span>
    </button>
    <button class="nav-item" id="nav-settings" onclick="goPage('settings')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="nav-label">設定</span>
    </button>
  </nav>

</div><!-- /app -->

<!-- TIP DETAIL SHEET -->
<div class="overlay" id="tip-overlay" onclick="closeTipSheet(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-drag-bar"></div>
    <div class="sheet-content">
      <button class="sheet-close" onclick="closeTipSheet()">閉じる</button>
      <div id="tip-detail"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
