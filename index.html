<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="XECTOR1">
<meta name="theme-color" content="#0a0a0f">
<title>XECTOR1 — Member Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">

  <!-- ── TOP BAR ── -->
  <header class="topbar">
    <div class="topbar-logo">XECTOR1</div>
    <div class="topbar-right">
      <span class="topbar-name" id="topbar-member"></span>
      <button class="topbar-avatar-btn" onclick="goPage('settings')" aria-label="設定">
        <div class="avatar-circle topbar-av" id="topbar-avatar-inner">?</div>
      </button>
    </div>
  </header>

  <!-- ── PAGES ── -->
  <main class="content">

    <!-- HOME -->
    <div id="page-home" class="page active">

      <div class="home-hero">
        <div class="home-hero-left">
          <p class="greeting" id="home-greeting">Good evening</p>
          <h1 class="home-name" id="home-name">メンバー</h1>
        </div>
        <button class="avatar-btn" onclick="goPage('settings')" aria-label="プロフィール設定">
          <div class="avatar-circle avatar-lg" id="home-avatar-inner">?</div>
          <span class="avatar-hint">設定</span>
        </button>
      </div>

      <!-- 目標カード -->
      <button class="goal-card" onclick="goPage('settings')">
        <span class="goal-label">MY GOAL</span>
        <span class="goal-text" id="goal-text">目標をタップして設定する →</span>
      </button>

      <!-- アクションボタン -->
      <div class="home-actions">
        <button class="action-row action-primary" onclick="goPage('book')">
          <span class="action-icon">📅</span>
          <div class="action-body">
            <span class="action-sub">Next Session</span>
            <span class="action-title">面談を予約する</span>
          </div>
          <span class="action-arrow">→</span>
        </button>
        <button class="action-row" onclick="goPage('tips')">
          <span class="action-icon">💡</span>
          <div class="action-body">
            <span class="action-sub">Knowledge Base</span>
            <span class="action-title">最新Tipsを見る</span>
          </div>
          <span class="action-arrow">→</span>
        </button>
      </div>

    </div><!-- /page-home -->

    <!-- TIPS -->
    <div id="page-tips" class="page">
      <div class="page-header">
        <h2 class="page-title">TIPS</h2>
        <p class="page-sub">SNS成長のための知識</p>
      </div>
      <div class="filter-row" id="filter-row"></div>
      <div class="tips-list" id="tips-list"></div>
    </div>

    <!-- BOOK -->
    <div id="page-book" class="page">
      <div class="page-header">
        <h2 class="page-title">予約</h2>
        <p class="page-sub">セッションを選んで予約してください</p>
      </div>
      <div class="tab-row">
        <button class="tab active" id="prog-tab-1" onclick="switchProgram(1)">プロデュース</button>
        <button class="tab" id="prog-tab-2" onclick="switchProgram(2)">ボイトレ A</button>
        <button class="tab" id="prog-tab-3" onclick="switchProgram(3)">ボイトレ B</button>
      </div>
      <div class="ycbm-wrap" id="ycbm-panel-1">
        <iframe src="https://skygarden0821.youcanbook.me/" style="width:100%;min-height:680px;border:none;" frameborder="0" scrolling="yes" allowtransparency="true"></iframe>
      </div>
      <div class="ycbm-wrap" id="ycbm-panel-2" style="display:none;">
        <iframe src="https://xector1voice01.youcanbook.me/" style="width:100%;min-height:680px;border:none;" frameborder="0" scrolling="yes" allowtransparency="true"></iframe>
      </div>
      <div class="ycbm-wrap" id="ycbm-panel-3" style="display:none;">
        <iframe src="https://xector1voice02.youcanbook.me/" style="width:100%;min-height:680px;border:none;" frameborder="0" scrolling="yes" allowtransparency="true"></iframe>
      </div>
    </div><!-- /page-book -->

    <!-- SETTINGS -->
    <div id="page-settings" class="page">
      <div class="page-header">
        <h2 class="page-title">設定</h2>
        <p class="page-sub">プロフィールと目標を編集</p>
      </div>

      <!-- アバター -->
      <section class="settings-section">
        <h3 class="settings-label">アイコン</h3>
        <div class="avatar-editor">
          <button class="avatar-edit-btn" onclick="document.getElementById('avatar-file-input').click()">
            <div class="avatar-circle avatar-xl" id="avatar-preview-inner">?</div>
            <span class="avatar-edit-hint">タップして変更</span>
          </button>
          <input type="file" id="avatar-file-input" accept="image/*" style="display:none" onchange="onAvatarFileSelected(event)">
        </div>
        <!-- クロップUI -->
        <div class="crop-wrap" id="avatar-crop-wrap">
          <p class="crop-hint">ドラッグで位置調整・ピンチでズーム</p>
          <div class="crop-canvas-wrap" id="crop-canvas-wrap">
            <canvas id="crop-canvas"></canvas>
          </div>
          <div class="crop-btns">
            <button class="btn-secondary" onclick="cancelCrop()">キャンセル</button>
            <button class="btn-primary" onclick="saveCrop()">保存する</button>
          </div>
        </div>
      </section>

      <!-- 名前 -->
      <section class="settings-section">
        <h3 class="settings-label">表示名</h3>
        <input class="text-input" type="text" id="settings-name" placeholder="例：田中雄介">
        <button class="btn-primary mt-8" onclick="saveName()">保存する</button>
      </section>

      <!-- 目標 -->
      <section class="settings-section">
        <h3 class="settings-label">目標</h3>
        <textarea class="text-input textarea" id="settings-goal" placeholder="例：2025年末までにYouTube10万人達成する"></textarea>
        <button class="btn-primary mt-8" onclick="saveGoal()">保存する</button>
      </section>

      <div style="height:60px;"></div>
    </div><!-- /page-settings -->

  </main>

  <!-- ── BOTTOM NAV ── -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="goPage('home')">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">ホーム</span>
    </button>
    <button class="nav-btn" id="nav-tips" onclick="goPage('tips')">
      <span class="nav-icon">💡</span>
      <span class="nav-label">Tips</span>
    </button>
    <button class="nav-btn" id="nav-book" onclick="goPage('book')">
      <span class="nav-icon">📅</span>
      <span class="nav-label">予約</span>
    </button>
    <button class="nav-btn" id="nav-settings" onclick="goPage('settings')">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">設定</span>
    </button>
  </nav>

</div><!-- /app -->

<!-- TIP シート -->
<div class="overlay" id="tip-overlay" onclick="closeTipSheet(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-bar"></div>
    <div class="sheet-body">
      <button class="sheet-close-btn" onclick="closeTipSheet()">✕ 閉じる</button>
      <div id="tip-sheet-content"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
